<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scope Endo | Admin Giriş</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --scope-navy: #071228;
      --scope-blue: #1456d9;
      --scope-cyan: #42d3f5;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top right, #1e3a8a, #071228);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: #fff;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      padding: 3rem 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-box {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-box img {
      height: 60px;
      filter: drop-shadow(0 0 15px rgba(66, 211, 245, 0.4));
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.5rem;
      display: block;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }

    /* İkonların (hem i hem svg) konumunu sabitleyen kritik düzeltme */
    .input-wrapper i, 
    .input-wrapper svg {
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      transition: all 0.3s ease;
      width: 18px;
      height: 18px;
      pointer-events: none; /* İkonun tıklamayı engellememesi için */
    }

    .form-control-custom {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 1rem !important;
      padding: 0.85rem 1rem 0.85rem 3.5rem !important;
      color: #fff !important;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-control-custom:focus {
      background: rgba(255, 255, 255, 0.1) !important;
      border-color: var(--scope-cyan) !important;
      box-shadow: 0 0 0 4px rgba(66, 211, 245, 0.1) !important;
      outline: none;
    }

    .form-control-custom:focus ~ i,
    .form-control-custom:focus ~ svg {
      color: var(--scope-cyan);
    }

    .btn-login {
      background: linear-gradient(135deg, var(--scope-blue), #0d41a1);
      border: none;
      border-radius: 1rem;
      padding: 1rem;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      margin-top: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px -5px rgba(20, 86, 217, 0.4);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -5px rgba(20, 86, 217, 0.6);
      color: #fff;
    }

    .footer-text {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="login-container">
    <div class="logo-box">
      <img src="/static/images/scopelogo.png" alt="Scope Endo">
    </div>
    
    <div class="login-card">
      <h1 class="h4 fw-bold text-center mb-4">Admin Kontrol Paneli</h1>
      
      <form method="post" action="/admin/login" class="d-grid">
        <div class="mb-1">
          <label class="form-label">Yönetici Adı</label>
          <div class="input-wrapper">
            <input class="form-control-custom w-100" name="username" placeholder="Kullanıcı adınızı girin" required autocomplete="username" />
            <i data-lucide="user"></i>
          </div>
        </div>

        <div class="mb-1">
          <label class="form-label">Güvenlik Şifresi</label>
          <div class="input-wrapper">
            <input class="form-control-custom w-100" type="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            <i data-lucide="lock"></i>
          </div>
        </div>

        <button class="btn btn-login w-100" type="submit">
          Sisteme Giriş Yap
        </button>
      </form>
    </div>

    <div class="footer-text">
      &copy; 2026 Scope Endo. Tüm Hakları Saklıdır.
    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
