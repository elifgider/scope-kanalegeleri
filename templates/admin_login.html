<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light d-flex align-items-center" style="min-height:100vh;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Admin Giriş</h1>
              <form method="post" action="/admin/login" class="d-grid gap-3">
                <input class="form-control" name="username" placeholder="Kullanıcı adı" required />
                <input class="form-control" type="password" name="password" placeholder="Şifre" required />
                <button class="btn btn-primary" type="submit">Giriş Yap</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
