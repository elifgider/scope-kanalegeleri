services:
  app:
    build:
      context: ..
      dockerfile: go-app/Dockerfile
    image: kanalegeleri-go:latest
    container_name: kanalegeleri-go
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      APP_ENV: production
    depends_on:
      - postgres
    volumes:
      - ./uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:17-alpine
    container_name: kanalegeleri-go-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kanalegeleri}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
